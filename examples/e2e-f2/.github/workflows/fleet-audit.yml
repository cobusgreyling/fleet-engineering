name: fleet-audit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fleet readiness (min score 55)
        run: npx @cobusgreyling/fleet-audit . --min-score=55