name: fleet-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fleet readiness score
        run: npx @cobusgreyling/fleet-audit . --suggest
      - name: Budget rollup
        run: npx @cobusgreyling/fleet-budget .